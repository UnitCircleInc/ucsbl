name: Build Workflow

on:
  push:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          path: sbl
          fetch-depth: "0"

      - name: Install the latest version of uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Setup GNU Arm Embedded Toolchain
        uses: carlosperate/arm-none-eabi-gcc-action@v1.10.1
        with:
          release: 12.3.Rel1

      - name: Build
        working-directory: sbl
        run: |
          make clean
          make CONFIG=nrf52840-none
          make release

      - name: Archive
        uses: actions/upload-artifact@v4
        with:
          path: |
            sbl/release/
          retention-days: 1

  release:
    runs-on: ubuntu-22.04
    needs: build
    if: ${{ startsWith( github.ref, 'refs/tags' ) }}
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: build
      - run: |
          cd build
          zip -r ../build.zip .
      - uses: ncipollo/release-action@v1
        with:
          artifacts: "build.zip"
